name: Build RK3588 Kernel with rknpu v0.9.8

on:
  workflow_dispatch:
  push:
    branches: [ "main" ]

env:
  KERNEL_COMMIT: b4ef083dc0c3608e744deabb43dc6b781aadbe6e

jobs:
  build-kernel:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout workflow repo (has kernel_config)
        uses: actions/checkout@v4
        with:
          path: workflow-repo

      - name: Checkout Rockchip kernel source
        uses: actions/checkout@v4
        with:
          repository: rockchip-linux/kernel
          ref: ${{ env.KERNEL_COMMIT }}
          path: kernel-source
          fetch-depth: 1

      - name: Install build dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            gcc-aarch64-linux-gnu \
            bc bison flex libssl-dev make \
            kmod cpio device-tree-compiler python3 \
            build-essential

      - name: Apply kernel config
        run: |
          cd kernel-source
          cp ../workflow-repo/kernel_config .config
          sed -i 's/CONFIG_ROCKCHIP_RKNPU=y/CONFIG_ROCKCHIP_RKNPU=m/' .config
          make ARCH=arm64 CROSS_COMPILE=aarch64-linux-gnu- olddefconfig
          grep CONFIG_ROCKCHIP_RKNPU .config

      - name: Build kernel Image + DTBs
        run: |
          cd kernel-source
          make -j$(nproc) ARCH=arm64 CROSS_COMPILE=aarch64-linux-gnu- Image dtbs 2>&1 | tail -10
          echo "=== Image ==="
          ls -lh arch/arm64/boot/Image

      - name: Build kernel modules (including rknpu.ko)
        run: |
          cd kernel-source
          make -j$(nproc) ARCH=arm64 CROSS_COMPILE=aarch64-linux-gnu- modules 2>&1 | tail -10
          echo "=== rknpu.ko ==="
          find . -name "rknpu.ko" -ls

      - name: Build kernel deb packages (optional)
        run: |
          cd kernel-source || true
          make -j$(nproc) ARCH=arm64 CROSS_COMPILE=aarch64-linux-gnu- bindeb-pkg 2>&1 | tail -10 || echo "Deb packaging skipped (non-fatal)"

      - name: Package artifacts
        run: |
          mkdir -p artifacts
          # Kernel Image
          cp -v kernel-source/arch/arm64/boot/Image artifacts/ || echo "No Image"
          # Kernel config
          cp -v kernel-source/.config artifacts/kernel.config || echo "No config"
          # rknpu.ko
          find kernel-source -name "rknpu.ko" -exec cp -v {} artifacts/ \; || echo "No rknpu.ko"
          # All .deb files from parent
          find $GITHUB_WORKSPACE -maxdepth 2 -name "*.deb" -exec cp -v {} artifacts/ \; || true
          # Also look in kernel-source parent
          find kernel-source/.. -maxdepth 1 -name "*.deb" -exec cp -v {} artifacts/ \; 2>/dev/null || true
          echo "=== Artifacts ==="
          ls -lh artifacts/
          echo "=== Total ==="
          du -sh artifacts/

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: rk3588-kernel-rknpu-v0.9.8
          path: artifacts/
          retention-days: 30
