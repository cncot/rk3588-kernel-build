# ============================================================
# Build RK3588 Kernel 6.1.75 + rknpu v1.7.3
# 注意：v1.7.3 在 rockchip-linux/rknpu 仓库（非 rknpu2）
# ============================================================
name: Build RK3588 Kernel 6.1.75 + rknpu v1.7.3

on:
  workflow_dispatch:
  push:
    branches: [ "main" ]
    paths:
      - '.github/workflows/build-rk3588-v173.yml'

env:
  KERNEL_REPO: orangepi-xunlong/linux-orangepi
  KERNEL_BRANCH: orange-pi-6.1-rk35xx
  ARCH: arm64
  CROSS_COMPILE: aarch64-linux-gnu-
  KERNEL_SUBLEVEL: 75
  KERNEL_LOCALVERSION: -vendor-rk35xx
  RKNPU_TAG: v1.7.3
  RKNPU_REPO: rockchip-linux/rknpu

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
        with:
          path: repo

      - uses: actions/checkout@v4
        with:
          repository: ${{ env.KERNEL_REPO }}
          ref: ${{ env.KERNEL_BRANCH }}
          path: kernel
          fetch-depth: 1

      - name: Fix SUBLEVEL to match running kernel
        run: |
          cd kernel
          OLD=$(grep "^SUBLEVEL" Makefile | awk '{print $NF}')
          echo "Current SUBLEVEL: $OLD -> Target: ${{ env.KERNEL_SUBLEVEL }}"
          sed -i "s/^SUBLEVEL = $OLD/SUBLEVEL = ${{ env.KERNEL_SUBLEVEL }}/" Makefile
          grep "^SUBLEVEL" Makefile

      - name: Patch dma-iommu.c - export iommu_get/put_dma_cookie
        run: |
          cd kernel
          python3 -u -c '
          with open("drivers/iommu/dma-iommu.c","r") as f:
              c = f.read()
          if "EXPORT_SYMBOL_GPL(iommu_get_dma_cookie)" in c:
              print("already patched, skip")
              import sys; sys.exit(0)
          c = c.replace("\treturn 0;\n}\n\n/**\n * iommu_get_msi_cookie",
              "\treturn 0;\n}\nEXPORT_SYMBOL_GPL(iommu_get_dma_cookie);\n\n/**\n * iommu_get_msi_cookie")
          c = c.replace("\tdomain->iova_cookie = NULL;\n}\n\n/**\n * iommu_dma_get_resv_regions",
              "\tdomain->iova_cookie = NULL;\n}\nEXPORT_SYMBOL_GPL(iommu_put_dma_cookie);\n\n/**\n * iommu_dma_get_resv_regions")
          with open("drivers/iommu/dma-iommu.c","w") as f:
              f.write(c)
          print("patched OK")
          '
          grep "EXPORT_SYMBOL.*iommu_.*_dma_cookie" drivers/iommu/dma-iommu.c

      - name: Install cross-compiler & build tools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            gcc-aarch64-linux-gnu \
            bc bison flex libssl-dev make \
            kmod cpio device-tree-compiler python3 \
            build-essential u-boot-tools

      - name: Apply kernel config (rknpu=m)
        run: |
          cp repo/kernel_config kernel/.config
          make -C kernel olddefconfig ARCH=${{ env.ARCH }} CROSS_COMPILE=${{ env.CROSS_COMPILE }}
          grep CONFIG_ROCKCHIP_RKNPU kernel/.config

      - name: Build kernel Image + dtbs + modules
        run: |
          make -C kernel -j$(nproc) Image dtbs modules \
            ARCH=${{ env.ARCH }} \
            CROSS_COMPILE=${{ env.CROSS_COMPILE }} \
            LOCALVERSION=${{ env.KERNEL_LOCALVERSION }} \
            KCFLAGS="-Wno-error"
          echo "=== Image ==="
          ls -lh kernel/arch/arm64/boot/Image
          echo "=== rknpu.ko ==="
          find kernel -name "rknpu.ko" -ls

      - name: Verify rknpu.ko version
        run: |
          MODPATH=$(find kernel -name "rknpu.ko" -print -quit)
          echo "Checking: $MODPATH"
          ${CROSS_COMPILE}objdump -p "$MODPATH" 2>/dev/null | grep -i "vermagic" || \
          modinfo "$MODPATH" 2>/dev/null | head -5 || \
          strings "$MODPATH" | grep -E "vermagic|version" | head -5

      - name: Clone rknpu userspace libs (v1.7.3)
        run: |
          git clone --depth=1 -b ${{ env.RKNPU_TAG }} \
            https://github.com/${{ env.RKNPU_REPO }}.git rknpu2 || \
          ( git clone https://github.com/${{ env.RKNPU_REPO }}.git rknpu2 && \
            cd rknpu2 && git fetch --tags && \
            git checkout tags/${{ env.RKNPU_TAG }} -b ${{ env.RKNPU_TAG }} )

      - name: Package artifacts
        run: |
          KREL=$(make -C kernel -s kernelrelease \
            LOCALVERSION=${{ env.KERNEL_LOCALVERSION }} 2>/dev/null)
          echo "Kernel release: $KREL"
          mkdir -p artifacts/lib/modules artifacts/rknpu2
          cp -v kernel/arch/arm64/boot/Image artifacts/
          mkdir -p artifacts/dtb/rockchip
          cp -v kernel/arch/arm64/boot/dts/rockchip/*.dtb artifacts/dtb/rockchip/ 2>/dev/null || true
          find kernel -name "rknpu.ko" -exec cp -v {} artifacts/ \;
          make -C kernel modules_install \
            INSTALL_MOD_PATH=$PWD/artifacts \
            LOCALVERSION=${{ env.KERNEL_LOCALVERSION }}
          cp kernel/.config artifacts/kernel.config
          echo "=== Looking for rknpu userspace libs ==="
          find rknpu2/ -name "*.so*" -type f 2>/dev/null | head -20
          find rknpu2/ -name "librknn*" -o -name "rknn_server*" 2>/dev/null | head -10
          for path in \
            "rknpu2/drivers/linux-aarch64/usr/lib" \
            "rknpu2/drivers/linux-aarch64-mini/usr/lib"; do
            if [ -d "$path" ]; then
              echo "Found at: $path"
              cp -v "$path"/* artifacts/rknpu2/ 2>/dev/null || true
            fi
          done
          if [ ! "$(ls -A artifacts/rknpu2/ 2>/dev/null)" ]; then
            echo "WARNING: No RK3588 userspace libs in rknpu v1.7.3"
            echo "This version supports RK1808/RK3399Pro, not RK3588"
          fi
          echo "=== artifacts ==="
          find artifacts -type f | head -30
          du -sh artifacts/

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: rk3588-kernel-6.1.75-rknpu-v1.7.3
          path: artifacts/
          retention-days: 7
