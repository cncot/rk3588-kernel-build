name: Build RK3588 Kernel with rknpu v0.9.8 (Orange Pi 5 Plus)

on:
  workflow_dispatch:
  push:
    branches: [ "main" ]

env:
  # Orange Pi kernel source (linux-orangepi), orange-pi-6.1-rk35xx branch
  KERNEL_REPO: orangepi-xunlong/linux-orangepi
  KERNEL_BRANCH: orange-pi-6.1-rk35xx
  ARCH: arm64
  CROSS_COMPILE: aarch64-linux-gnu-
  # Version to patch into Makefile (match running kernel)
  KERNEL_SUBLEVEL: 75
  KERNEL_LOCALVERSION: -vendor-rk35xx

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      # Checkout our repo first (has kernel_config and workflow)
      - uses: actions/checkout@v4
        with:
          path: repo

      # Checkout Orange Pi kernel source
      - uses: actions/checkout@v4
        with:
          repository: ${{ env.KERNEL_REPO }}
          ref: ${{ env.KERNEL_BRANCH }}
          path: kernel
          fetch-depth: 1

      - name: Fix SUBLEVEL in Makefile to match running kernel
        run: |
          cd kernel
          OLD_SUBLEVEL=$(grep "^SUBLEVEL" Makefile | head -1 | awk '{print $NF}')
          echo "Current SUBLEVEL: $OLD_SUBLEVEL"
          echo "Target SUBLEVEL:  ${{ env.KERNEL_SUBLEVEL }}"
          sed -i "s/^SUBLEVEL = $OLD_SUBLEVEL/SUBLEVEL = ${{ env.KERNEL_SUBLEVEL }}/" Makefile
          grep "^SUBLEVEL" Makefile

      - name: Patch kernel - add EXPORT_SYMBOL_GPL for iommu_get_dma_cookie/iommu_put_dma_cookie
        run: |
          cd kernel
          python3 -u -c '
          import sys
          with open("drivers/iommu/dma-iommu.c","r") as f:
              c = f.read()
          if "EXPORT_SYMBOL_GPL(iommu_get_dma_cookie)" in c:
              print("already patched, skip")
              sys.exit(0)
          c = c.replace("\treturn 0;\n}\n\n/**\n * iommu_get_msi_cookie", "\treturn 0;\n}\nEXPORT_SYMBOL_GPL(iommu_get_dma_cookie);\n\n/**\n * iommu_get_msi_cookie")
          c = c.replace("\tdomain->iova_cookie = NULL;\n}\n\n/**\n * iommu_dma_get_resv_regions", "\tdomain->iova_cookie = NULL;\n}\nEXPORT_SYMBOL_GPL(iommu_put_dma_cookie);\n\n/**\n * iommu_dma_get_resv_regions")
          with open("drivers/iommu/dma-iommu.c","w") as f:
              f.write(c)
          print("patched OK")
          '
          grep "EXPORT_SYMBOL.*iommu_.*_dma_cookie" drivers/iommu/dma-iommu.c

      - name: Install cross-compiler & build tools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            gcc-aarch64-linux-gnu \
            bc bison flex libssl-dev make \
            kmod cpio device-tree-compiler python3 \
            build-essential

      - name: Apply kernel config (rknpu=m)
        run: |
          cp repo/kernel_config kernel/.config
          make -C kernel olddefconfig
          grep CONFIG_ROCKCHIP_RKNPU kernel/.config

      - name: Check kernel version
        run: |
          make -C kernel -s kernelrelease LOCALVERSION=${{ env.KERNEL_LOCALVERSION }}

      - name: Build kernel Image + dtbs + modules
        run: |
          make -C kernel -j$(nproc) Image dtbs modules LOCALVERSION=${{ env.KERNEL_LOCALVERSION }}
          echo "=== Image ==="
          ls -lh kernel/arch/arm64/boot/Image
          echo "=== rknpu.ko ==="
          find kernel -name "rknpu.ko" -ls

      - name: Verify rknpu.ko version
        run: |
          # Check modinfo of the built rknpu.ko
          if [ -f kernel/drivers/rknpu/rknpu.ko ]; then
            MODPATH=kernel/drivers/rknpu/rknpu.ko
          else
            MODPATH=$(find kernel -name "rknpu.ko" -print -quit)
          fi
          echo "Checking: $MODPATH"
          ${CROSS_COMPILE}objdump -p "$MODPATH" 2>/dev/null | grep -i "vermagic\|rknpu" || \
          modinfo "$MODPATH" 2>/dev/null | head -5 || \
          strings "$MODPATH" | grep -E "vermagic|version" | head -5

      - name: Package full kernel (Image + dtbs + modules + rknpu)
        run: |
          KREL=$(make -C kernel -s kernelrelease LOCALVERSION=${{ env.KERNEL_LOCALVERSION }} 2>/dev/null)
          echo "Kernel release: $KREL"
          mkdir -p artifacts/lib/modules
          # Image
          cp -v kernel/arch/arm64/boot/Image artifacts/
          # dtbs - preserve rockchip subdir structure
          mkdir -p artifacts/dtb/rockchip
          cp -v kernel/arch/arm64/boot/dts/rockchip/*.dtb artifacts/dtb/rockchip/ 2>/dev/null || true
          # rknpu.ko (standalone for easy deployment)
          find kernel -name "rknpu.ko" -exec cp -v {} artifacts/ \;
          # All modules (for full install)
          make -C kernel modules_install INSTALL_MOD_PATH=$PWD/artifacts LOCALVERSION=${{ env.KERNEL_LOCALVERSION }}
          # Save .config for reference
          cp kernel/.config artifacts/kernel.config
          # Fix up module path name (kernelrelease might differ)
          echo "=== artifacts tree ==="
          find artifacts -type f | head -30
          echo "=== disk usage ==="
          du -sh artifacts/

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: rk3588-kernel-rknpu-mod
          path: artifacts/
          retention-days: 7
