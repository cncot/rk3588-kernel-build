name: Build RK3588 Kernel with rknpu v0.9.8

on:
  workflow_dispatch:
  push:
    branches: [ "main" ]

env:
  KERNEL_COMMIT: b4ef083dc0c3608e744deabb43dc6b781aadbe6e

jobs:
  build-kernel:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout workflow repo (has kernel_config)
        uses: actions/checkout@v4
        with:
          path: workflow-repo

      - name: Checkout Rockchip kernel source
        uses: actions/checkout@v4
        with:
          repository: rockchip-linux/kernel
          ref: ${{ env.KERNEL_COMMIT }}
          path: kernel-source
          fetch-depth: 1

      - name: Install cross-compiler & build tools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            gcc-aarch64-linux-gnu \
            bc bison flex libssl-dev make \
            kmod cpio device-tree-compiler python3

      - name: Apply kernel config
        run: |
          cd kernel-source
          cp ../workflow-repo/kernel_config .config
          sed -i 's/CONFIG_ROCKCHIP_RKNPU=y/CONFIG_ROCKCHIP_RKNPU=m/' .config
          make ARCH=arm64 CROSS_COMPILE=aarch64-linux-gnu- olddefconfig
          echo "=== rknpu config ==="
          grep CONFIG_ROCKCHIP_RKNPU .config

      - name: Build full kernel (Image + modules + DTBs + deb packages)
        run: |
          cd kernel-source
          # Build the whole kernel and package into .deb
          make -j$(nproc) ARCH=arm64 CROSS_COMPILE=aarch64-linux-gnu- \
            bindeb-pkg 2>&1 | tail -40
          # Save build exit status
          echo "BUILD_EXIT=$?" 

      - name: Collect and package artifacts
        run: |
          mkdir -p artifacts
          # .deb files go to parent of kernel-source
          find $GITHUB_WORKSPACE -maxdepth 2 -name "*.deb" | while read f; do
            cp -v "$f" artifacts/
          done
          # Kernel Image
          cp -v kernel-source/arch/arm64/boot/Image artifacts/ || true
          # Kernel config used
          cp -v kernel-source/.config artifacts/kernel.config || true
          # rknpu module
          find kernel-source -name "rknpu.ko" -exec cp -v {} artifacts/ \; || true
          # Show what we got
          echo "=== Artifacts ==="
          ls -lh artifacts/
          echo "=== Total size ==="
          du -sh artifacts/

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: rk3588-kernel-rknpu-v0.9.8
          path: artifacts/
          retention-days: 30
