name: Build RK3588 Kernel with rknpu v0.9.8

on:
  workflow_dispatch:
  push:
    branches: [ "main" ]

env:
  KERNEL_REPO: https://github.com/rockchip-linux/kernel.git
  KERNEL_BRANCH: develop-6.1
  KERNEL_COMMIT: b4ef083dc0c3608e744deabb43dc6b781aadbe6e

jobs:
  build-kernel:
    runs-on: ubuntu-24.04
    steps:
      # Step 1: Checkout THIS repo first (has kernel_config + workflow)
      - name: Checkout workflow repo
        uses: actions/checkout@v4
        with:
          path: workflow-repo

      # Step 2: Checkout Rockchip kernel source separately
      - name: Checkout kernel source
        uses: actions/checkout@v4
        with:
          repository: rockchip-linux/kernel
          ref: ${{ env.KERNEL_COMMIT }}
          path: kernel-source
          fetch-depth: 1

      - name: Install cross-compiler
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            gcc-aarch64-linux-gnu \
            bc bison flex libssl-dev make \
            kmod cpio device-tree-compiler \
            python3
          aarch64-linux-gnu-gcc --version | head -1

      - name: Apply kernel config
        run: |
          cd kernel-source
          # Copy kernel config from workflow repo
          cp ../workflow-repo/kernel_config .config
          # Ensure rknpu is module
          sed -i 's/CONFIG_ROCKCHIP_RKNPU=y/CONFIG_ROCKCHIP_RKNPU=m/' .config
          # Update config for new kernel options
          make ARCH=arm64 CROSS_COMPILE=aarch64-linux-gnu- olddefconfig
          grep CONFIG_ROCKCHIP_RKNPU .config

      - name: Build kernel
        run: |
          cd kernel-source
          # Build kernel Image, DTBs, and modules
          make -j$(nproc) ARCH=arm64 CROSS_COMPILE=aarch64-linux-gnu- Image modules dtbs 2>&1 | tail -30

      - name: Build kernel deb packages
        run: |
          cd kernel-source
          make -j$(nproc) ARCH=arm64 CROSS_COMPILE=aarch64-linux-gnu- \
            bindeb-pkg 2>&1 | tail -20

      - name: Package artifacts
        run: |
          mkdir -p artifacts
          # Copy .deb packages (they go to parent directory)
          find kernel-source/.. -maxdepth 1 -name "*.deb" -exec cp {} artifacts/ \;
          # Copy kernel Image
          cp kernel-source/arch/arm64/boot/Image artifacts/
          # Copy kernel config
          cp kernel-source/.config artifacts/kernel.config
          # Find and copy rknpu.ko
          find kernel-source -name "rknpu.ko" -exec cp {} artifacts/ \;
          find kernel-source -name "rknpu.ko" -exec ls -lh {} \;
          ls -lh artifacts/

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: rk3588-kernel-rknpu-v0.9.8
          path: artifacts/
          retention-days: 30
