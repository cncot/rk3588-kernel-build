name: Build RK3588 Kernel with rknpu v0.9.8

on:
  workflow_dispatch:
  push:
    branches: [ "main" ]

env:
  KERNEL_COMMIT: b4ef083dc0c3608e744deabb43dc6b781aadbe6e
  ARCH: arm64
  CROSS_COMPILE: aarch64-linux-gnu-

jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
      # Checkout our repo first (has kernel_config and workflow)
      - uses: actions/checkout@v4
        with:
          path: repo

      # Checkout Rockchip kernel source
      - uses: actions/checkout@v4
        with:
          repository: rockchip-linux/kernel
          ref: ${{ env.KERNEL_COMMIT }}
          path: kernel
          fetch-depth: 1
      - name: Patch kernel - add EXPORT_SYMBOL_GPL for iommu_get_dma_cookie/iommu_put_dma_cookie
        run: |
          cd kernel
          # Check if iommu_get_dma_cookie has EXPORT_SYMBOL
          if ! grep -q "EXPORT_SYMBOL.*iommu_get_dma_cookie" drivers/iommu/dma-iommu.c; then
            echo "Adding EXPORT_SYMBOL_GPL for iommu_get_dma_cookie..."
            sed -i '/^int iommu_get_dma_cookie/,/^}/a EXPORT_SYMBOL_GPL(iommu_get_dma_cookie);' drivers/iommu/dma-iommu.c
          fi
          if ! grep -q "EXPORT_SYMBOL.*iommu_put_dma_cookie" drivers/iommu/dma-iommu.c; then
            echo "Adding EXPORT_SYMBOL_GPL for iommu_put_dma_cookie..."
            sed -i '/^void iommu_put_dma_cookie/,/^}/a EXPORT_SYMBOL_GPL(iommu_put_dma_cookie);' drivers/iommu/dma-iommu.c
          fi
          grep "EXPORT_SYMBOL.*iommu_.*_dma_cookie" drivers/iommu/dma-iommu.c || echo "WARNING: EXPORT not applied!"


      - name: Install cross-compiler & build tools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            gcc-aarch64-linux-gnu \
            bc bison flex libssl-dev make \
            kmod cpio device-tree-compiler python3 \
            build-essential

      - name: Apply kernel config (rknpu=m)
        run: |
          cp repo/kernel_config kernel/.config
          sed -i 's/CONFIG_ROCKCHIP_RKNPU=y/CONFIG_ROCKCHIP_RKNPU=m/' kernel/.config
          make -C kernel olddefconfig
          grep CONFIG_ROCKCHIP_RKNPU kernel/.config

      - name: Build kernel Image + dtbs + modules
        run: |
          make -C kernel -j$(nproc) Image dtbs modules
          echo "=== Image ==="
          ls -lh kernel/arch/arm64/boot/Image
          echo "=== rknpu.ko ==="
          find kernel -name "rknpu.ko" -ls

      - name: Build .deb packages
        run: |
          make -C kernel -j$(nproc) bindeb-pkg || echo "deb packaging optional"
          ls -lh ../*.deb 2>/dev/null || true

      - name: Package artifacts
        run: |
          mkdir -p artifacts
          cp -v kernel/arch/arm64/boot/Image artifacts/
          find kernel -name "rknpu.ko" -exec cp -v {} artifacts/ \;
          cp -v kernel/.config artifacts/kernel.config
          cp -v ../*.deb artifacts/ 2>/dev/null || true
          ls -lh artifacts/

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: rk3588-kernel
          path: artifacts/
          retention-days: 30
